<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SPACE Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style7.css"/>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="logo">
      <img src="Copy of Space Logo - black.png" alt="SPACE" style="height:42px;width:auto;display:block;" />
    </div>
    <div class="search-wrap" id="searchWrap">
      <svg class="search-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input class="search-input" id="searchInput" placeholder="Search school name or code..." autocomplete="off"/>
      <div class="dropdown" id="dropdown"></div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div id="mainContent"></div>

  <script src="ren6.js"></script>
</body>
</html>
